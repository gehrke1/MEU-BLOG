<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Blog | Contato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="site-header">
        <div class="logo">Meu Blog</div>
        <nav class="main-nav" aria-label="Menu principal">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Sobre Mim</a></li>
                <li><a href="curriculum.html">Currículo</a></li>
                <li><a href="receitas.html">Receitas</a></li>
                <li><a href="contact.html" class="active">Contato</a></li>
            </ul>
        </nav>
        <div class="controls">
            <button id="font-decrease" aria-label="Diminuir tamanho da fonte" title="Diminuir fonte">A-</button>
            <button id="font-increase" aria-label="Aumentar tamanho da fonte" title="Aumentar fonte">A+</button>
            <button id="theme-toggle" aria-label="Alternar modo noturno" title="Modo noturno">🌙</button>
        </div>
    </header>

    <main>
        <h1 class="section-title">Contato</h1>
        <p>Quer falar comigo? Preencha o formulário abaixo que eu respondo assim que possível.</p>

        <form id="contact-form" class="contact-form" novalidate>
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo">
                <span class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="voce@exemplo.com">
                <span class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="assunto">Assunto</label>
                <input type="text" id="assunto" name="assunto" placeholder="Sobre o que você quer falar?">
                <span class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem aqui..."></textarea>
                <span class="error-message"></span>
            </div>

            <button type="submit" class="submit-btn">Enviar mensagem</button>

            <p id="form-success" class="form-success">Mensagem enviada com sucesso! Obrigado pelo contato.</p>
        </form>
    </main>

    <footer class="site-footer">
        <p>© 2026 Meu Blog · Lucas Gehrke · Trabalho de Web Lab - UPF</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
